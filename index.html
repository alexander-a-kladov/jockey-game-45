<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Horse Race</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rye&family=Libre+Baskerville:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a0a00;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height: 100vh; height: 100dvh;
    font-family:'Libre Baskerville',serif; overflow:hidden;
    touch-action: none;
  }
  #wrapper {
    position:relative;
    width:1280px;
    max-width:100vw;
    display:flex; flex-direction:column; align-items:center;
    max-height: 100vh; max-height: 100dvh;
  }
  canvas {
    display:block;
    width:100%;
    max-height: calc(100vh - 36px);
    max-height: calc(100dvh - 36px);
    border:4px solid #8b5a00; border-radius:4px;
    box-shadow:0 0 60px #8b3a00aa,0 0 120px #3a1a0088;
    touch-action: none;
  }
  #hint {
    margin-top:4px; text-align:center; color:#c8902a; font-family:'Rye',serif;
    font-size:11px; letter-spacing:1px; text-shadow:0 0 8px #8b3a00;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100vw;
    padding:0 8px; line-height:1.3;
  }
  @media (max-height: 480px) { #hint { display:none; } }
  @media (orientation: landscape) and (max-height: 600px) {
    canvas { max-height: 100vh; max-height: 100dvh; }
    #hint  { display:none; }
  }
  #hint span { color:#f5c842; }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="1280" height="600"></canvas>
  <div id="hint">
    <span>→</span> УСКОРЕНИЕ &nbsp;|&nbsp; <span>←</span> ТОРМОЖЕНИЕ &nbsp;|&nbsp; <span>SPACE</span> ПРЫЖОК<br><span>📱</span> МОБИЛЬНОЕ: ПРАВАЯ НИЖНЯЯ ЧАСТЬ — УСКОРЕНИЕ, ЛЕВАЯ НИЖНЯЯ — ТОРМОЖЕНИЕ, ПРАВАЯ ВЕРХНЯЯ — ПРЫЖОК
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1280, H = 600;
const GROUND_Y = 490;

// ── CONSTANTS ──────────────────────────────────────────────
const MAX_SPEED       = 85 / 0.12;
const MIN_TIRED_SPEED = 30 / 0.12;
const ACCELERATION    = MAX_SPEED * 0.42;
const FRICTION        = MAX_SPEED * 0.05;
const BRAKE_FORCE     = MAX_SPEED * 1.0;
const GRAVITY         = 1700;
const JUMP_FORCE      = -760;
const MIN_JUMP_SPEED  = MAX_SPEED * 0.25;
const FINISH_DISTANCE = 500;
const MAX_JUMP_HEIGHT = 140;
const STUN_TIME       = 1.0;
const MAX_COLLISIONS  = 3;
const FATIGUE_GAIN    = 0.0055;
const FATIGUE_RECOVERY= 0.12;
const SCALE           = 0.55;
const RAW_OFFSETS = [18,18,18,18,33,33,33,33,40,40,40,40];
const GROUND_OFFSETS  = RAW_OFFSETS.map(v => v * SCALE);

// ── PLANE CONFIG ────────────────────────────────────────────
// Plane appears when distanceM >= FINISH_DISTANCE/3
// at max speed (85 km/h = ~708 px/s world speed)
// The plane enters from the RIGHT edge and moves LEFT slowly
// Banner text trails behind it on a white canvas ribbon

const PLANE_TRIGGER_DIST = FINISH_DISTANCE / 3; // 166.7m
const PLANE_Y_BASE       = 100;   // px from top of canvas
const PLANE_SPEED        = 55;    // px/s screen speed (moves left)
const PLANE_BOB_AMP      = 8;     // px vertical bobbing amplitude
const PLANE_BOB_FREQ     = 0.7;   // Hz
const BANNER_GAP         = 30;    // px gap between plane tail and banner
const BANNER_HEIGHT      = 36;    // px
const BANNER_FONT        = 'bold 23px Libre Baskerville';
const BANNER_TEXT        = '🎉 С Днем Рождения, Сергей! 🎂🤖🇷🇺🇺🇸';

// ── SPRITE SHEET ───────────────────────────────────────────
const horseImg = new Image();
const hayImg   = new Image();
const planeImg = new Image();
const COLS = 4, ROWS = 3;
let frameW = 0, frameH = 0;
const FRAME_ORDER = [];
let assetsReady = 0;
const NEEDED = 3;

horseImg.onload = () => {
  frameW = horseImg.naturalWidth  / COLS;
  frameH = horseImg.naturalHeight / ROWS;
  for (let row = 0; row < ROWS; row++)
    for (let col = COLS-1; col >= 0; col--)
      FRAME_ORDER.push({col, row});
  assetsReady++;
  if (assetsReady === NEEDED) init();
};
hayImg.onload   = () => { assetsReady++; if (assetsReady===NEEDED) init(); };
planeImg.onload = () => { assetsReady++; if (assetsReady===NEEDED) init(); };
horseImg.src = 'images/horses.png';
hayImg.src   = 'images/haystack.png';
planeImg.src = 'images/plane.png';

// ── AUDIO (Web Audio API) ──────────────────────────────────
// Using Web Audio API for all sounds.
// Advantages over HTMLAudioElement:
//   - No "unlock" play+pause trick needed per-element
//   - Works as soon as AudioContext is resumed (one gesture)
//   - No dependency on file being buffered at gesture time
//   - fetch+decodeAudioData loads files independently of gestures

const GALLOP_SRC = 'sounds/gallop.mp3';
const OUCH_SRC   = 'sounds/ouch.mp3';
const PLANES_SRC = 'sounds/plane.mp3';

let audioCtx = null;
let audioUnlocked = false;

// Decoded buffers (filled by fetch, independent of user gesture)
const buffers = { gallop: null, ouch: null, plane: null };

// Active looping source nodes
let gallopNode = null, gallopGain = null;
let planeNode  = null, planeGain  = null;

// Pending gallop volume set before AudioContext was ready
let gallopWanted   = false;
let gallopVolTarget = 0;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// Called synchronously inside a user-gesture handler.
// Just resumes the AudioContext — no play() needed per element.
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) {}
  // If gallop was requested before unlock, start it now
  if (gallopWanted && gallopVolTarget > 0) {
    _startGallopNode(gallopVolTarget);
  }
}

function unlockAudioOnce() {
  unlockAudio();
  window.removeEventListener('pointerdown', unlockAudioOnce, true);
  window.removeEventListener('touchstart',  unlockAudioOnce, true);
  window.removeEventListener('click',       unlockAudioOnce, true);
  window.removeEventListener('keydown',     unlockAudioOnce, true);
}
window.addEventListener('pointerdown', unlockAudioOnce, true);
window.addEventListener('touchstart',  unlockAudioOnce, true);
window.addEventListener('click',       unlockAudioOnce, true);
window.addEventListener('keydown',     unlockAudioOnce, true);

// Fetch and decode a sound file into buffers{}
async function loadSound(key, url) {
  try {
    const ctx = getAudioCtx();
    const resp = await fetch(url);
    const arr  = await resp.arrayBuffer();
    buffers[key] = await ctx.decodeAudioData(arr);
  } catch(e) {
    console.log('loadSound failed:', key, e);
  }
}

// Start loading all sounds immediately (no gesture needed for fetch)
loadSound('gallop', GALLOP_SRC);
loadSound('ouch',   OUCH_SRC);
loadSound('plane',  PLANES_SRC);

// Play a one-shot sound (ouch etc.)
function playOneShot(key) {
  if (!audioUnlocked || !buffers[key]) return;
  try {
    const ctx = getAudioCtx();
    const src = ctx.createBufferSource();
    src.buffer = buffers[key];
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}

// Internal: create and start the gallop loop node
function _startGallopNode(vol) {
  if (!audioUnlocked || !buffers.gallop) return;
  if (gallopNode) return; // already running
  try {
    const ctx = getAudioCtx();
    gallopGain = ctx.createGain();
    gallopGain.gain.setValueAtTime(vol, ctx.currentTime);
    gallopGain.connect(ctx.destination);
    gallopNode = ctx.createBufferSource();
    gallopNode.buffer = buffers.gallop;
    gallopNode.loop = true;
    gallopNode.connect(gallopGain);
    gallopNode.start(0);
  } catch(e) { gallopNode = null; gallopGain = null; }
}

function setGallopVolume(v) {
  v = Math.max(0, Math.min(1, v));
  gallopVolTarget = v;

  if (v > 0) {
    gallopWanted = true;
    if (!audioUnlocked) return; // unlockAudio() will start it
    if (!buffers.gallop) return; // still loading — check below
    if (!gallopNode) _startGallopNode(v);
    else if (gallopGain) gallopGain.gain.setValueAtTime(v, audioCtx.currentTime);
  } else {
    gallopWanted = false;
    if (gallopNode) {
      try { gallopNode.stop(); } catch(e) {}
      gallopNode = null;
      gallopGain = null;
    }
  }
}

// Poll: if gallop was wanted but buffer wasn't ready yet, start it once loaded
// (runs every frame via the game loop — negligible cost)
function tickGallopReady() {
  if (gallopWanted && audioUnlocked && buffers.gallop && !gallopNode) {
    _startGallopNode(gallopVolTarget);
  }
}

// Plane loop
function _startPlaneNode(vol) {
  if (!audioUnlocked || !buffers.plane) return;
  if (planeNode) return;
  try {
    const ctx = getAudioCtx();
    planeGain = ctx.createGain();
    planeGain.gain.setValueAtTime(vol, ctx.currentTime);
    planeGain.connect(ctx.destination);
    planeNode = ctx.createBufferSource();
    planeNode.buffer = buffers.plane;
    planeNode.loop = true;
    planeNode.connect(planeGain);
    planeNode.start(0);
  } catch(e) { planeNode = null; planeGain = null; }
}

function setPlaneVolume(v) {
  v = Math.max(0, Math.min(1, v));
  if (v > 0) {
    if (!audioUnlocked || !buffers.plane) return;
    if (!planeNode) _startPlaneNode(v);
    else if (planeGain) planeGain.gain.setValueAtTime(v, audioCtx.currentTime);
  } else {
    if (planeNode) {
      try { planeNode.stop(); } catch(e) {}
      planeNode = null;
      planeGain = null;
    }
  }
}

document.addEventListener('visibilitychange', () => {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
});

// ── STATE ──────────────────────────────────────────────────
const STATE = { INTRO:0, PLAYING:1, FINISH_WAIT:2, WIN:3, FAILED:4 };
let state, horseX, horseY, vertVel, isJumping, speed, distanceM;
let elapsedTime, frameIndex, animTimer, finishTimer;
let collisionCount, stunTimer, fatigue, bestTime;
let obstacles;

// Plane state
let planeActive   = false;  // has the plane been triggered this run
let planeX        = W + 50; // current screen X of plane nose
let planeBobT     = 0;      // time accumulator for bobbing
let planeTriggered= false;  // set once when distanceM >= trigger

// Measured banner text width (computed after fonts load)
let bannerTextWidth = 0;

function measureBanner() {
  ctx.save();
  ctx.font = BANNER_FONT;
  bannerTextWidth = ctx.measureText(BANNER_TEXT).width;
  ctx.restore();
}

function generateObstacles() {
  const obs = [];
  let pos = 25;
  for (let i = 0; i < 30; i++) {
    pos += 10 + Math.random() * 12;
    if (pos >= FINISH_DISTANCE - 15) break;
    const h = Math.floor(MAX_JUMP_HEIGHT*0.5 + Math.random()*MAX_JUMP_HEIGHT*0.25);
    const w = h - 15 + Math.floor(Math.random()*30);
    obs.push({ x_m:pos, height:h, width:w, passed:false });
  }
  return obs;
}

function resetGame() {
  horseX=0; horseY=0; vertVel=0; isJumping=false;
  speed=0; distanceM=0; elapsedTime=0;
  frameIndex=10; animTimer=0; finishTimer=0;
  collisionCount=0; stunTimer=0; fatigue=0;
  obstacles = generateObstacles();
  setGallopVolume(0);
  setPlaneVolume(0);
  planeNode = null; planeGain = null;
  planeActive   = false;
  planeTriggered= false;
  planeX        = W + 200;
  planeBobT     = 0;
  state = STATE.INTRO;
}

// ── KEYS ───────────────────────────────────────────────────
const keys = {};
const touchControls = {
  right:false,
  left:false,
  jump:false
};

function updateTouchControls(e) {
  e.preventDefault();

  // Unlock audio on first ANY touch
  unlockAudio();

  touchControls.right = false;
  touchControls.left = false;
  touchControls.jump = false;

  const rect = canvas.getBoundingClientRect();

  for (const touch of e.touches) {
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    if (y < rect.height * 0.45 && x > rect.width * 0.5) {
      touchControls.jump = true;
    } else if (y >= rect.height * 0.45 && x > rect.width * 0.5) {
      touchControls.right = true;
    } else if (y >= rect.height * 0.45 && x <= rect.width * 0.5) {
      touchControls.left = true;
    }
  }

  // Start game on intro with any touch (right side OR any tap)
  if (state === STATE.INTRO && (touchControls.right || touchControls.jump || e.touches.length > 0)) {
    state = STATE.PLAYING;
  }

  if (
    state === STATE.PLAYING &&
    touchControls.jump &&
    !isJumping &&
    speed >= MIN_JUMP_SPEED &&
    stunTimer <= 0
  ) {
    isJumping = true;
    vertVel = JUMP_FORCE;
  }

  if ((state === STATE.WIN || state === STATE.FAILED) && e.touches.length > 0) {
    resetGame();
  }
}

canvas.addEventListener('touchstart', updateTouchControls, { passive:false });
canvas.addEventListener('touchmove', updateTouchControls, { passive:false });
canvas.addEventListener('touchend', updateTouchControls, { passive:false });
canvas.addEventListener('touchcancel', updateTouchControls, { passive:false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') e.preventDefault();
  unlockAudio();
  if (!keys[e.code]) {
    if (e.code === 'Space') {
      if (state === STATE.INTRO) {
        state = STATE.PLAYING;
      } else if (state === STATE.PLAYING && !isJumping && speed >= MIN_JUMP_SPEED && stunTimer <= 0) {
        isJumping = true; vertVel = JUMP_FORCE;
      } else if (state === STATE.WIN || state === STATE.FAILED) {
        resetGame();
      }
    }
  }
  keys[e.code] = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('visibilitychange', async () => {
  if (audioCtx && audioCtx.state === 'suspended') {
    try {
      await audioCtx.resume();
    } catch(e) {}
  }
});


// ── DRAW ───────────────────────────────────────────────────
function drawFrame(fi, dx, dy) {
  if (!FRAME_ORDER.length) return;
  const {col, row} = FRAME_ORDER[fi];
  ctx.drawImage(horseImg,
    col*frameW, row*frameH, frameW, frameH,
    dx, dy, frameW*SCALE, frameH*SCALE);
}
function getFrameDrawY(fi) {
  return GROUND_Y - frameH*SCALE + GROUND_OFFSETS[fi];
}

function drawGround(camX) {
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#4a90c8'); sky.addColorStop(1,'#a8d8f0');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,GROUND_Y);

  // distant hills
  ctx.fillStyle='#6aaa50';
  ctx.beginPath();
  ctx.moveTo(0,GROUND_Y);
  const hx = camX*0.08;
  for (let x=0;x<=W;x+=4) {
    const y = GROUND_Y - 55 - Math.sin((x+hx)*0.012)*30 - Math.sin((x+hx)*0.005)*20;
    //x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,GROUND_Y); ctx.closePath(); ctx.fill();

  // clouds
  ctx.fillStyle='#ffffffd0';
  [100,320,580,820,1100].forEach((cx,i) => {
    const x = ((cx - camX*0.15) % (W+400) + W+400) % (W+400) - 200;
    const y = 130+i*22, r = 55+i*14;
    ctx.beginPath();
    ctx.arc(x,y,r*0.58,0,Math.PI*2);
    ctx.arc(x+r*.44,y-r*.22,r*.37,0,Math.PI*2);
    ctx.arc(x-r*.37,y+r*.1,r*.30,0,Math.PI*2);
    ctx.fill();
  });

  const grd = ctx.createLinearGradient(0,GROUND_Y,0,H);
  grd.addColorStop(0,'#4a8a30'); grd.addColorStop(0.15,'#3a7028'); grd.addColorStop(1,'#1e4010');
  ctx.fillStyle=grd; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);

  // track line
  ctx.strokeStyle='#5a9a40'; ctx.lineWidth=2;
  for (let i=-2;i<30;i++) {
    const x=(i*160)-(camX%160);
    ctx.beginPath(); ctx.moveTo(x,GROUND_Y); ctx.lineTo(x+35,GROUND_Y+32); ctx.stroke();
  }

  // distance markers
  ctx.font='bold 11px sans-serif'; ctx.fillStyle='#ffffff99'; ctx.textAlign='left';
  for (let d=50;d<=FINISH_DISTANCE;d+=50) {
    const sx=d*100-camX;
    if (sx>-60&&sx<W+60) ctx.fillText(d+'м', sx-12, GROUND_Y+20);
  }
}

function drawObstacle(sx, obs) {
  ctx.drawImage(hayImg, sx, GROUND_Y-obs.height, obs.width, obs.height);
}

function drawFinish(sx) {
  ctx.fillStyle='#555'; ctx.fillRect(sx,GROUND_Y-220,8,220);
  const sq=18;
  for(let r=0;r<5;r++) for(let c=0;c<7;c++){
    ctx.fillStyle=(r+c)%2===0?'#fff':'#000';
    ctx.fillRect(sx+8+c*sq,GROUND_Y-220+r*sq,sq,sq);
  }
  ctx.font='bold 15px Rye'; ctx.fillStyle='#f5c842'; ctx.textAlign='center';
  ctx.fillText('ФИНИШ',sx+65,GROUND_Y-230); ctx.textAlign='left';
}

// ── PLANE & BANNER ─────────────────────────────────────────
function drawPlane(bobY) {
  if (!planeActive) return;

  const pw = 160, ph = 100; // display size of plane image
  const px = planeX - pw;   // draw so nose is at planeX

  // banner measurements
  const padding     = 18;
  const bannerW     = bannerTextWidth + padding*2;
  const ropeLen     = BANNER_GAP;

  // banner starts after a rope trailing the plane tail
  const tailX = planeX + pw;          // left edge (tail side) of plane
  const bannerLeft  = tailX + ropeLen;
  const bannerRight = bannerLeft + bannerW;
  const bannerTop   = bobY - BANNER_HEIGHT/2;
  const bannerBot   = bannerTop + BANNER_HEIGHT;

  // rope (string from plane tail to banner)
  ctx.save();
  ctx.strokeStyle = '#888888';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(tailX, bobY);
  ctx.lineTo(bannerRight, bobY);
  ctx.stroke();
  ctx.setLineDash([]);

  // banner fabric (white with slight shadow)
  ctx.shadowColor='rgba(0,0,0,0.18)'; ctx.shadowBlur=6; ctx.shadowOffsetY=3;
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(bannerLeft, bannerTop, bannerW, BANNER_HEIGHT);
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // banner border (thin blue)
  ctx.strokeStyle='#3a6abf'; ctx.lineWidth=1.5;
  ctx.strokeRect(bannerLeft, bannerTop, bannerW, BANNER_HEIGHT);

  // banner text
  ctx.font = BANNER_FONT;
  ctx.fillStyle = '#c41010';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(BANNER_TEXT, bannerLeft + bannerW/2, bannerTop + BANNER_HEIGHT/2);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';

  // plane image (flip horizontally so it faces left)
  ctx.save();
  ctx.translate(px + pw, bobY - ph/2);
  //ctx.scale(-1, 1);
  ctx.drawImage(planeImg, 0, 0, pw, ph);
  ctx.restore();

  ctx.restore();
}

// Returns screen X of plane center for volume calc
function updatePlane(dt) {
  if (!planeActive) return;
  planeBobT += dt;
  planeX -= PLANE_SPEED * dt;
}

function planeVolume() {
  if (!planeActive) return 0;
  // max volume when plane center is near W/2
  const centerX = planeX; // approx center of plane
  const dist = Math.abs(centerX - W/2);
  const fadeRange = W * 0.8;
  return Math.max(0, 1 - dist/fadeRange);
}

// ── UI ─────────────────────────────────────────────────────
function drawUI() {
  const speedKmh = speed*0.12;
  ctx.fillStyle='#000000aa';
  const panH = bestTime!==null ? 200 : 172;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(12,12,248,panH,10); else ctx.rect(12,12,248,panH);
  ctx.fill();
  ctx.strokeStyle='#8b5a00'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.font='14px Libre Baskerville'; ctx.fillStyle='#f5c842'; ctx.textAlign='left';
  const lines=[
    `Скорость: ${speedKmh.toFixed(1)} км/ч`,
    `Дистанция: ${Math.min(distanceM,FINISH_DISTANCE).toFixed(0)} / 500 м`,
    `Время: ${elapsedTime.toFixed(1)} с`,
    `Столкновений: ${collisionCount}/${MAX_COLLISIONS}`,
  ];
  if (bestTime!==null) lines.push(`Рекорд: ${bestTime.toFixed(1)} с`);
  lines.forEach((l,i)=>ctx.fillText(l,22,40+i*28));

  const bx=22, by=panH-14, bw=210, bh=14;
  ctx.fillStyle='#33220099'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=`hsl(${120-fatigue*120},72%,42%)`; ctx.fillRect(bx,by,bw*fatigue,bh);
  ctx.strokeStyle='#8b5a00'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  ctx.font='10px Libre Baskerville'; ctx.fillStyle='#fff';
  ctx.fillText(`Усталость ${Math.round(fatigue*100)}%`,bx+52,by+10);

  const px=12,py=H-28,pw=W-24,ph=14;
  ctx.fillStyle='#00000099'; ctx.fillRect(px,py,pw,ph);
  ctx.fillStyle='#c8902a'; ctx.fillRect(px,py,pw*Math.min(distanceM/FINISH_DISTANCE,1),ph);
  ctx.strokeStyle='#8b5a00'; ctx.lineWidth=1; ctx.strokeRect(px,py,pw,ph);
  const progX=px+pw*Math.min(distanceM/FINISH_DISTANCE,1)-8;
  ctx.font='14px serif'; ctx.fillText('🐴',progX,py+12);
}

function overlay(r,g,b,a){ ctx.fillStyle=`rgba(${r},${g},${b},${a})`; ctx.fillRect(0,0,W,H); }
function bigText(t,color,y){
  ctx.font='bold 56px Rye'; ctx.textAlign='center';
  ctx.fillStyle='#00000099'; ctx.fillText(t,W/2+3,y+3);
  ctx.fillStyle=color; ctx.fillText(t,W/2,y); ctx.textAlign='left';
}
function subText(t,y){
  ctx.font='19px Libre Baskerville'; ctx.textAlign='center';
  ctx.fillStyle='#f5c842'; ctx.fillText(t,W/2,y); ctx.textAlign='left';
}

// ── MAIN LOOP ──────────────────────────────────────────────
let lastTS = null;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTS) { lastTS=ts; return; }
  const dt = Math.min((ts-lastTS)/1000, 0.05);
  lastTS = ts;
  ctx.clearRect(0,0,W,H);

  const camX = horseX - 280;

  // ── UPDATE ──
  tickGallopReady(); // start gallop once buffer is loaded + audio unlocked

  if (state === STATE.PLAYING) {
    elapsedTime += dt;

    const fatThr = MAX_SPEED*0.20;
    if (speed > fatThr) fatigue += FATIGUE_GAIN*dt;
    else { const rec=1-(speed/Math.max(fatThr,.001)); fatigue -= FATIGUE_RECOVERY*rec*dt; }
    fatigue = Math.max(0,Math.min(1,fatigue));

    const curMax = MAX_SPEED-(MAX_SPEED-MIN_TIRED_SPEED)*fatigue;

    if (stunTimer>0) { stunTimer-=dt; speed=0; }
    else {
      let acc=false;
      if (!isJumping) {
      if (keys['ArrowRight']||keys['KeyD']||touchControls.right){ speed+=ACCELERATION*dt; acc=true; }
      if (keys['ArrowLeft'] ||keys['KeyA']||touchControls.left)  speed-=BRAKE_FORCE*dt;
      }
      if (!acc&&speed>0) speed-=FRICTION*dt;
      speed=Math.max(0,Math.min(speed,curMax));
    }

    const gvol = stunTimer>0 ? 0 : speed/Math.max(curMax,1);
    setGallopVolume(gvol);

    horseX+=speed*dt; distanceM=horseX/100;

    // Plane trigger
    if (!planeTriggered && distanceM >= PLANE_TRIGGER_DIST) {
      planeTriggered = true;
      planeActive    = true;
      planeX         = W + 220; // enter from right
      planeBobT      = 0;
    }

    if (isJumping) {
      vertVel+=GRAVITY*dt; horseY+=vertVel*dt;
      if (horseY>=0){ horseY=0;vertVel=0;isJumping=false;frameIndex=1; }
    }

    if (isJumping) {
      animTimer+=dt; if(animTimer>=.22){ animTimer=0; frameIndex=(frameIndex+1)%12; }
    } else if (speed>1) {
      const spd2=.09-(speed/Math.max(curMax,1))*.05;
      animTimer+=dt; if(animTimer>=spd2){ animTimer=0; frameIndex=(frameIndex+1)%12; }
    } else { frameIndex=10; }

    // Collision
    const standing = speed<1&&!isJumping;
    const hDY = getFrameDrawY(frameIndex)+horseY+(standing?20:0);
    const dw=frameW*SCALE, dh=frameH*SCALE;
    const hL=280+40, hR=280+dw-40, hT=hDY+40-30, hB=hDY+dh-5;
    
    for (const obs of obstacles) {
      if (obs.passed) continue;
      const wx=obs.x_m*100, sx=wx-camX;
      const oL=sx,oR=sx+obs.width,oT=GROUND_Y-obs.height,oB=GROUND_Y;
      if (hR>oL&&hL<oR&&hB>oT&&hT<oB) {
        obs.passed=true;
        playOneShot('ouch');
        if ((horseX+dw-40)>(wx+obs.width/2)) {
          speed*=.5;
        } else {
          stunTimer=STUN_TIME; speed=0; collisionCount++;
          horseX=wx+obs.width+100; distanceM=horseX/100;
          isJumping=false; horseY=0; vertVel=0; frameIndex=10;
          if (collisionCount>=MAX_COLLISIONS){ setGallopVolume(0); state=STATE.FAILED; }
        }
        break;
      }
    }

    if (distanceM>=FINISH_DISTANCE&&state===STATE.PLAYING) {
      state=STATE.FINISH_WAIT; finishTimer=0; speed=0; setGallopVolume(0);
      if (bestTime===null||elapsedTime<bestTime) bestTime=elapsedTime;
    }
  }

  if (state===STATE.FINISH_WAIT) {
    finishTimer+=dt;
    if (finishTimer>=3) state=STATE.WIN;
  }

  // Update plane position & sound (always, even after finish)
  if (planeActive) {
    updatePlane(dt);
    const pvol = planeVolume();
    setPlaneVolume(pvol);
    // deactivate when plane + banner fully off left edge
    const bannerTailX = planeX + 160 + BANNER_GAP + (bannerTextWidth + 36);
    if (bannerTailX < -60) {
      planeActive = false;
      setPlaneVolume(0);
    }
  }

  // ── DRAW ──
  drawGround(camX);

  for (const obs of obstacles) {
    const sx=obs.x_m*100-camX;
    if (sx>-200&&sx<W+200) drawObstacle(sx,obs);
  }
  const fsx=FINISH_DISTANCE*100-camX;
  if (fsx>-200&&fsx<W+200) drawFinish(fsx);

  // Horse
  const standing2=speed<1&&!isJumping;
  const hDY2=getFrameDrawY(frameIndex)+horseY+(standing2?10:0);
  drawFrame(frameIndex,280,hDY2);
  // Stun flash
  if (stunTimer>0&&Math.floor(stunTimer*2)%2===0){
    ctx.fillStyle='rgba(255,0,0,.18)'; ctx.fillRect(0,0,W,H);
  }

  // Plane (drawn after horse so it appears behind clouds but above ground)
  if (planeActive) {
    const bobY = PLANE_Y_BASE + Math.sin(planeBobT * PLANE_BOB_FREQ * Math.PI * 2) * PLANE_BOB_AMP;
    drawPlane(bobY);
  }

  if (state!==STATE.INTRO) drawUI();

  if (state===STATE.INTRO) {
    overlay(0,0,0,.55);
    bigText('Скачки','#f5c842',H/2-55);
    subText('Нажмите SPACE или правую часть экрана для старта',H/2+10);
    ctx.font='13px Libre Baskerville'; ctx.textAlign='center'; ctx.fillStyle='#c8902a';
    ctx.fillText('→ ускорение | ← торможение | SPACE прыжок | 📱 правая нижняя — ускорение, левая нижняя — торможение, правая верхняя — прыжок',W/2,H/2+52);
    ctx.textAlign='left';
  }

  if (state===STATE.FINISH_WAIT||state===STATE.WIN) {
    overlay(0,0,0,.5);
    bigText('ФИНИШ!','#f5e060',H/2-40);
    if (bestTime!==null) subText(`Лучшее время: ${bestTime.toFixed(1)} с`,H/2+20);
    if (state===STATE.WIN) subText('SPACE — сыграть снова',H/2+60);
  }
  if (state===STATE.FAILED) {
    overlay(0,0,0,.65);
    bigText('ПРОВАЛ!','#ff4444',H/2-40);
    subText(`${MAX_COLLISIONS} столкновения — не финишировал`,H/2+15);
    subText('SPACE — попробовать снова',H/2+55);
  }
}

function init() {
  measureBanner();
  bestTime = null;
  resetGame();
  requestAnimationFrame(loop);
}
</script>
